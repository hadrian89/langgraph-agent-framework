name: Agent CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (main + dev)
        run: uv sync --group dev

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Validate agent imports
        run: uv run python -c "import app.main"

      - name: Validate LangGraph graph build
        run: |
          uv run python -c "
          from app.core.tool_loader import load_tools
          from app.core.agent_loader import load_agents
          from app.core.graph_builder import build_graph
          load_tools()
          load_agents()
          build_graph('fastapi')
          print('Graph built successfully')
          "

      - name: Validate agents and tools registry
        run: |
          uv run python -c "
          from app.core.tool_loader import load_tools
          from app.core.agent_loader import load_agents
          from app.core.agent_registry import AgentRegistry
          from app.core.tools_registry import ToolRegistry
          load_tools()
          load_agents()
          print('Agents:', AgentRegistry.list_agents())
          print('Tools:', ToolRegistry.list_tools())
          assert len(AgentRegistry.list_agents()) > 0, 'No agents registered'
          assert len(ToolRegistry.list_tools()) > 0, 'No tools registered'
          "

  deploy-agentcore:
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: aws-production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Generate version tag
        run: echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Deploy AgentCore Runtime
        run: |
          uv run agentcore deploy --image-tag ${VERSION} \
            --env OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --env LLM_PROVIDER=openai \
            --env OPENAI_MODEL=gpt-4o-mini \
            --env OLLAMA_MODEL=llama3.2
