name: Agent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies from pyproject
        run: |
          source .venv/bin/activate
          uv pip install -e .

      - name: Install dev tools
        run: |
          source .venv/bin/activate
          uv pip install pre-commit

      - name: Run pre-commit checks
        run: |
          source .venv/bin/activate
          pre-commit run --all-files

      - name: Validate agent imports
        run: |
          source .venv/bin/activate
          python -c "import app.main"

      - name: Validate LangGraph graph build
        run: |
          source .venv/bin/activate
          python -c "from app.core.graph_builder import build_graph; build_graph('fastapi')"
      
      - name: Validate agents registry
        run: |
          source .venv/bin/activate
          python -c "from app.core.agent_registry import AgentRegistry; print(AgentRegistry.all_agents())"

  deploy-agentcore:
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: aws-production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e .

      - name: Deploy AgentCore Runtime
        run: |
          source .venv/bin/activate
          agentcore deploy